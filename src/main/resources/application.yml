spring:
  application:
    name: enterprise-data-platform

  datasource:
    url: jdbc:h2:mem:dataplatform
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,batch
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.enterprise.platform: DEBUG
    org.springframework.batch: INFO
    org.springframework.kafka: INFO

---
spring:
  config:
    activate:
      on-profile: kafka

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: data-platform
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  kafka:
    topics:
      meter-data: meter-data-events
      customer-data: customer-data-events
      billing-data: billing-data-events

---
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dataplatform}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
